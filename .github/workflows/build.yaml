name: build

on:
  workflow_dispatch:

jobs:
  build_linux:
    runs-on: ubuntu-24.04

    env:
      PREFIX: /opt/qemu
      PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/usr/local/lib64/pkgconfig

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential \
            libtool \
            meson \
            ninja-build \
            pkg-config \
            libcapstone-dev \
            device-tree-compiler \
            libglib2.0-dev \
            gnutls-bin \
            libjpeg-turbo8-dev \
            libpng-dev \
            libslirp-dev \
            libssh-dev \
            libusb-1.0-0-dev \
            liblzo2-dev \
            libncurses5-dev \
            libpixman-1-dev \
            libsnappy-dev \
            vde2 \
            zstd \
            libgnutls28-dev \
            libgmp-dev \
            lzfse \
            liblzfse-dev \
            rsync

      - name: Build nettle 3.10.2
        run: |
          wget -q https://ftpmirror.gnu.org/gnu/nettle/nettle-3.10.2.tar.gz
          echo "fe9ff51cb1f2abb5e65a6b8c10a92da0ab5ab6eaf26e7fc2b675c45f1fb519b5  nettle-3.10.2.tar.gz" | sha256sum -c -
          tar -xf nettle-3.10.2.tar.gz
          cd nettle-3.10.2
          ./configure --prefix=/usr/local --disable-openssl
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Configure QEMU
        run: |
          mkdir build
          cd build
          ../configure \
            --prefix=${PREFIX} \
            --target-list=aarch64-softmmu,x86_64-softmmu \
            --disable-linux-user \
            --disable-guest-agent \
            --enable-capstone \
            --enable-slirp \
            --enable-lzfse \
            --enable-nettle \
            --enable-gnutls \
            --disable-werror \
            --disable-tests \
            --disable-qom-cast-debug \
            --disable-plugins \
            --extra-ldflags="-Wl,-rpath,\$ORIGIN/../lib"

      - name: Build QEMU
        run: |
          cd build
          make -j$(nproc)

      - name: Install into staging directory
        run: |
          cd build
          make install DESTDIR=$(pwd)/package

      - name: Strip binaries (safe)
        run: |
          find build/package -type f -executable -exec sh -c 'file -b "$1" | grep -q ELF && strip --strip-unneeded "$1" || true' _ {} \;

      - name: Verify linkage
        run: |
          ldd build/package${PREFIX}/bin/qemu-system-x86_64 || true

      - name: Create tar.gz package safely
        run: |
          # 一時ディレクトリにコピーして安全に圧縮
          mkdir -p /tmp/package
          rsync -a --delete build/package/ /tmp/package/
          cd /tmp/package
          tar --owner=0 --group=0 -czf linux-qemu-ubuntu24-stable.tar.gz .
          mv linux-qemu-ubuntu24-stable.tar.gz ../../build/package/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-qemu-ubuntu24-stable
          path: build/package/linux-qemu-ubuntu24-stable.tar.gz
